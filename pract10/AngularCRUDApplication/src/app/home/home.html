<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header header-bg text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Manage Employees</h5>

      <a routerLink="/add" class="btn btn-success btn-sm">
        ADD
      </a>
    </div>

    <div class="card-body">

      <table class="table table-bordered table-hover">

        <thead class="table-light">

          <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let emp of employees">

            <td>{{emp.FirstName}}</td>
            <td>{{emp.LastName}}</td>
            <td>{{emp.Email}}</td>
            <td>{{emp.Address}}</td>
            <td>{{emp.Phone}}</td>

            <td>

              <a [routerLink]="['/edit',emp.id]" class="btn btn-warning btn-sm">
                Edit
              </a>

            </td>

          </tr>

          <tr *ngIf="employees.length==0">

            <td colspan="6" class="text-center">
              No Employee Found
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
